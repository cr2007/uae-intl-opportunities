name: Update README and Deploy to Pages

on:
  push:
    branches: [main, workflow-version-bump] # Pushes only to main branch
    paths:
      - 'data.json'                           # Metadata file
      - 'closed_opportunities.json'
      - 'generate_readme.py'                  # Update script
      - 'README_template.md'                  # Template README file
      - 'index_template.md'
      - '.github/workflows/update-readme.yml' # GitHub Actions workflow
  schedule:
    - cron: '0 0 * * *'  # Run daily at midnight UTC
  workflow_dispatch:  #Allow manual triggering

permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Job 1: Generate README files
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: '3.12'

      - name: Generate README files
        run: uv run generate_readme.py

      - name: Commit changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md index.md CLOSED.md data.json closed_opportunities.json
          git diff --staged --quiet || git commit -m "docs: Auto-update - move expired opportunities"
          git push || echo "No changes to push"

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5

  # Job 2: Deploy to GitHub Pages
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
