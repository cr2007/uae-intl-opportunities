name: Update README from JSON and Deploy to Pages

on:
  push:
    branches: [main] # Pushes only to main branch
    paths:
      - 'data.json'                           # Metadata file
      - 'closed_opportunities.json'
      - 'generate_readme.py'                  # Update script
      - 'README_template.md'                  # Template README file
      - '.github/workflows/update-readme.yml' # GitHub Actions workflow
  workflow_dispatch:  #Allow manual triggering

permissions:
  contents: read # Set read-only by default
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-readme:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # override ONLY for this job

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Generate README
        run: python generate_readme.py

      - name: Commit and push changes
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md CLOSED.md
          if ! git diff --staged --quiet; then
            git commit -m "docs: Update README from data.json"
            git push
          else
            echo "No changes to commit"
          fi

  # Deploy to GitHub Pages
  deploy-pages:
    needs: update-readme
    runs-on: ubuntu-latest
    environment:
        name: github-pages

    steps:
      - uses: actions/checkout@v6
        with:
          ref: main  # Ensure we get the latest commit from update-readme job

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare Pages content
        run: |
          mkdir -p _site
          cp README.md _site/index.md
          cp CLOSED.md _site/closed.md
          cp _config.yml _site/

          # Add front matter to index.md
          echo "---" > _site/index_tmp.md
          echo "layout: default" >> _site/index_tmp.md
          echo "title: UAE International Opportunities" >> _site/index_tmp.md
          echo "---" >> _site/index_tmp.md
          echo "" >> _site/index_tmp.md
          cat _site/index.md >> _site/index_tmp.md
          mv _site/index_tmp.md _site/index.md
          
          # Add front matter to closed.md
          echo "---" > _site/closed_tmp.md
          echo "layout: default" >> _site/closed_tmp.md
          echo "title: Closed Opportunities Archive" >> _site/closed_tmp.md
          echo "---" >> _site/closed_tmp.md
          echo "" >> _site/closed_tmp.md
          cat _site/closed.md >> _site/closed_tmp.md
          mv _site/closed_tmp.md _site/closed.md

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy GitHub Pages site
        uses: actions/deploy-pages@v4
